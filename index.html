<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1e3a5f">
    <title>Taller IES ACCI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --accent: #f97316;
            --success: #10b981;
            --error: #ef4444;
            --bg: #f8fafc;
            --bg-card: #fff;
            --text: #0f172a;
            --text2: #64748b;
            --border: #e2e8f0;
        }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; right: 0; height: 220px;
            background: linear-gradient(135deg, #1e3a5f, #2563eb);
            border-radius: 0 0 50% 50% / 0 0 40px 40px; z-index: 0;
        }
        .app { position: relative; z-index: 1; }
        .header { padding: 1rem; display: flex; align-items: center; justify-content: space-between; }
        .header-brand { display: flex; align-items: center; gap: 0.85rem; }
        .header-logo { 
            width: 56px; 
            height: 56px; 
            background: white; 
            border-radius: 14px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 4px 16px rgba(0,0,0,0.2); 
            overflow: hidden;
        }
        .header-logo img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }
        .header-logo svg { width: 28px; height: 28px; color: var(--primary); }
        .header h1 { font-family: 'Space Grotesk', sans-serif; color: white; font-size: 1.15rem; font-weight: 700; }
        .header span { font-size: 0.72rem; color: rgba(255,255,255,0.85); }
        .btn { padding: 0.6rem 1.1rem; background: white; border: none; border-radius: 10px; font-family: inherit; font-size: 0.88rem; font-weight: 600; cursor: pointer; }
        .content { padding: 0.5rem 1rem 1.5rem; }
        .search-box { background: white; border-radius: 14px; padding: 0.75rem 1rem; display: flex; align-items: center; gap: 0.7rem; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin-bottom: 1.1rem; }
        .search-box input { flex: 1; border: none; background: transparent; font-size: 0.95rem; }
        .search-box input:focus { outline: none; }
        .voice-btn { width: 40px; height: 40px; background: #f1f5f9; border: none; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .voice-btn.recording { background: var(--error); color: white; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
        .filters { display: flex; gap: 0.45rem; margin-bottom: 1.1rem; overflow-x: auto; }
        .filter { padding: 0.5rem 1rem; background: rgba(255,255,255,0.9); border: none; border-radius: 18px; font-size: 0.82rem; font-weight: 500; cursor: pointer; white-space: nowrap; }
        .filter.active { background: var(--primary); color: white; }
        .section-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.15rem; font-weight: 700; margin-bottom: 0.75rem; }
        
        /* TARJETAS GRANDES - IMAGEN QUE LLENA */
        .machines-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 1rem; 
        }
        @media (min-width: 420px) { 
            .machines-grid { gap: 1.1rem; } 
        }
        @media (min-width: 600px) { 
            .machines-grid { grid-template-columns: repeat(3, 1fr); } 
        }
        
        .card { 
            background: white; 
            border-radius: 18px; 
            overflow: hidden; 
            box-shadow: 0 3px 12px rgba(0,0,0,0.08); 
            cursor: pointer; 
            transition: transform 0.25s, box-shadow 0.25s; 
            position: relative;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 12px 28px rgba(0,0,0,0.12); }
        
        /* IMAGEN QUE LLENA TODA LA TARJETA */
        .card-img { 
            width: 100%;
            height: 180px;
            position: relative;
        }
        .card-img img { 
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }
        .card-badge { position: absolute; top: 0.6rem; right: 0.6rem; padding: 0.25rem 0.6rem; border-radius: 8px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; z-index: 2; }
        .badge-soldadura { background: #fecaca; color: #991b1b; }
        .badge-corte { background: #bfdbfe; color: #1e40af; }
        .badge-conformado { background: #bbf7d0; color: #166534; }
        
        /* TEXTO ENCIMA DE LA IMAGEN */
        .card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 2rem 0.9rem 0.85rem;
        }
        .card-name { 
            font-family: 'Space Grotesk', sans-serif; 
            font-weight: 700; 
            font-size: 1.05rem; 
            color: white;
            margin-bottom: 0.15rem;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        .card-model { 
            font-size: 0.8rem; 
            color: rgba(255,255,255,0.85);
            margin-bottom: 0.3rem;
        }
        .card-status { 
            display: flex; 
            align-items: center; 
            gap: 0.3rem; 
            font-size: 0.72rem; 
            color: rgba(255,255,255,0.7);
        }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: none; align-items: flex-end; justify-content: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-box { background: white; width: 100%; max-width: 500px; max-height: 92vh; border-radius: 20px 20px 0 0; overflow: hidden; display: flex; flex-direction: column; }
        @media (min-width: 600px) { .modal { align-items: center; padding: 1rem; } .modal-box { border-radius: 16px; } }
        .modal-header { padding: 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .modal-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.05rem; font-weight: 700; }
        .modal-close { width: 36px; height: 36px; background: #f1f5f9; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { background: var(--error); color: white; }
        .tabs { display: flex; border-bottom: 1px solid var(--border); }
        .tab { flex: 1; padding: 0.85rem; background: transparent; border: none; border-bottom: 2px solid transparent; font-family: inherit; font-size: 0.9rem; font-weight: 600; cursor: pointer; color: var(--text2); }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
        .modal-body { flex: 1; overflow-y: auto; padding: 1rem; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .pdf-container { background: #1e293b; border-radius: 10px; height: 420px; }
        .pdf-container embed { width: 100%; height: 100%; border: none; }
        .chat-box { display: flex; flex-direction: column; height: 400px; }
        .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.75rem; padding: 0.3rem; }
        .msg { display: flex; gap: 0.55rem; max-width: 90%; }
        .msg.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 0.8rem; font-weight: 700; }
        .msg.ai .msg-avatar { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
        .msg.user .msg-avatar { background: var(--accent); color: white; }
        .msg-bubble { padding: 0.85rem 1rem; border-radius: 14px; font-size: 0.92rem; line-height: 1.6; }
        .msg.ai .msg-bubble { background: #f1f5f9; border-bottom-left-radius: 4px; }
        .msg.user .msg-bubble { background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .msg-bubble strong { color: var(--accent); }
        .msg.user .msg-bubble strong { color: #fef3c7; }
        .msg-bubble p { margin-bottom: 0.4rem; }
        .msg-bubble p:last-child { margin-bottom: 0; }
        .msg-bubble ul, .msg-bubble ol { padding-left: 1.2rem; margin: 0.4rem 0; }
        .msg-bubble li { margin-bottom: 0.25rem; }
        .msg-bubble em { display: block; margin-top: 0.5rem; font-size: 0.78rem; opacity: 0.7; font-style: normal; }
        .chat-input-box { padding: 0.65rem 0; border-top: 1px solid var(--border); }
        .quick-btns { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.55rem; }
        .quick-btn { padding: 0.45rem 0.8rem; background: #f8fafc; border: 1px solid var(--border); border-radius: 16px; font-size: 0.78rem; cursor: pointer; }
        .quick-btn:hover { background: var(--primary); border-color: var(--primary); color: white; }
        .input-row { display: flex; gap: 0.5rem; }
        .chat-input { flex: 1; padding: 0.85rem 1rem; border: 1px solid var(--border); border-radius: 12px; font-size: 0.95rem; font-family: inherit; }
        .chat-input:focus { outline: none; border-color: var(--primary); }
        .chat-btn { width: 48px; height: 48px; border: none; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .chat-btn.send { background: var(--primary); color: white; }
        .chat-btn.send:disabled { background: #94a3b8; }
        .chat-btn.voice { background: #f8fafc; border: 1px solid var(--border); color: var(--text2); }
        .chat-btn.voice.recording { background: var(--error); border-color: var(--error); color: white; animation: pulse 1s infinite; }
        .toast-container { position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%); z-index: 2000; }
        .toast { background: #0f172a; color: white; padding: 0.75rem 1.2rem; border-radius: 10px; font-size: 0.88rem; animation: fadeIn 0.3s; }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--error); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .login-content { padding: 1.3rem; text-align: center; }
        .login-icon { width: 72px; height: 72px; background: linear-gradient(135deg, #e0e7ff, #c7d2fe); border-radius: 14px; margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .login-icon img { width: 100%; height: 100%; object-fit: contain; padding: 8px; }
        .login-icon svg { width: 36px; height: 36px; color: var(--primary); }
        .login-content h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.25rem; margin-bottom: 0.2rem; }
        .login-content > p { color: var(--text2); margin-bottom: 1.1rem; font-size: 0.9rem; }
        .login-options { display: flex; flex-direction: column; gap: 0.55rem; }
        .login-option { display: flex; align-items: center; gap: 0.8rem; padding: 0.95rem; background: #f8fafc; border: 1px solid var(--border); border-radius: 12px; cursor: pointer; text-align: left; }
        .login-option:hover { border-color: var(--primary); }
        .login-option-icon { width: 42px; height: 42px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .login-option-icon svg { width: 22px; height: 22px; color: var(--primary); }
        .login-option-info h3 { font-size: 0.95rem; }
        .login-option-info p { font-size: 0.78rem; color: var(--text2); }
        .code-section { margin-top: 0.9rem; padding-top: 0.9rem; border-top: 1px solid var(--border); }
        .code-section input { width: 100%; padding: 0.7rem; background: #f8fafc; border: 1px solid var(--border); border-radius: 10px; font-size: 1rem; text-align: center; margin-bottom: 0.5rem; }
        .code-section input:focus { outline: none; border-color: var(--primary); }
        .code-hint { font-size: 0.72rem; color: var(--text2); }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-brand">
                <div class="header-logo">
                    <img src="LOGOTALLER.png" alt="Logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
                </div>
                <div><h1>Taller IES ACCI</h1><span>Asistente IA con PDF</span></div>
            </div>
            <button class="btn" id="loginBtn">Entrar</button>
        </header>
        <main class="content">
            <div class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                <input type="text" id="searchInput" placeholder="Buscar maquina...">
                <button class="voice-btn" id="voiceSearchBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/></svg></button>
            </div>
            <div class="filters">
                <button class="filter active" data-filter="all">Todas</button>
                <button class="filter" data-filter="soldadura">Soldadura</button>
                <button class="filter" data-filter="corte">Corte</button>
                <button class="filter" data-filter="conformado">Conformado</button>
            </div>
            <h2 class="section-title">Maquinas</h2>
            <div class="machines-grid" id="grid"></div>
        </main>
    </div>

    <div class="modal" id="machineModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 class="modal-title" id="title">-</h3>
                <button class="modal-close" id="close"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            </div>
            <div class="tabs">
                <button class="tab active" data-tab="chat">Consultar IA</button>
                <button class="tab" data-tab="pdf">Ver Manual PDF</button>
            </div>
            <div class="modal-body">
                <div id="chatTab" class="tab-content active">
                    <div class="chat-box">
                        <div class="chat-messages" id="msgs"></div>
                        <div class="chat-input-box">
                            <div class="quick-btns">
                                <button class="quick-btn" onclick="ask('Cuales son las especificaciones tecnicas?')">Especificaciones</button>
                                <button class="quick-btn" onclick="ask('Como se pone en marcha?')">Arranque</button>
                                <button class="quick-btn" onclick="ask('Que mantenimiento necesita?')">Mantenimiento</button>
                                <button class="quick-btn" onclick="ask('Que medidas de seguridad debo tomar?')">Seguridad</button>
                            </div>
                            <div class="input-row">
                                <input type="text" id="input" class="chat-input" placeholder="Escribe tu pregunta...">
                                <button class="chat-btn voice" id="voiceBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/></svg></button>
                                <button class="chat-btn send" id="send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="pdfTab" class="tab-content"><div class="pdf-container" id="pdf"></div></div>
            </div>
        </div>
    </div>

    <div class="modal" id="loginModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 class="modal-title">Acceso</h3>
                <button class="modal-close" id="loginClose"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            </div>
            <div class="login-content">
                <div class="login-icon">
                    <img src="LOGOTALLER.png" alt="Logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                </div>
                <h2>Bienvenido</h2>
                <p>Selecciona tu rol</p>
                <div class="login-options">
                    <button class="login-option" id="studentBtn"><div class="login-option-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/></svg></div><div class="login-option-info"><h3>Alumno</h3><p>Consultar</p></div></button>
                    <button class="login-option" id="teacherBtn"><div class="login-option-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><div class="login-option-info"><h3>Profesor</h3><p>Control total</p></div></button>
                </div>
                <div class="code-section hidden" id="codeSection">
                    <input type="password" id="code" placeholder="Codigo">
                    <button class="btn btn-primary" style="width:100%" id="codeBtn">Verificar</button>
                    <p class="code-hint">Codigo: TALLER2024</p>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toasts"></div>

    <script>
        const MACHINES = [
    {id:'rustler',name:'Rustler EM',model:'EM',brand:'ESAB',cat:'soldadura',img:'rustler.jpg',pdf:'rustler.pdf'},
    {id:'buddy',name:'Buddy ARC 180',model:'ARC 180',brand:'ESAB',cat:'soldadura',img:'buddy.jpg',pdf:'buddy.pdf'},
    {id:'buddytig',name:'Buddy TIG 160',model:'TIG 160',brand:'ESAB',cat:'soldadura',img:'buddytig.jpg',pdf:'buddytig.pdf'},
    {id:'sierra',name:'Sierra de Cinta',model:'FAT 280',brand:'FAT',cat:'corte',img:'FAT280.jpg',pdf:'FAT280.pdf'},
    {id:'curvadora',name:'Curvadora',model:'RBM 1050-22',brand:'RBM',cat:'conformado',img:'RBMCURVADORA.jpg',pdf:'RBMCURVADORA.pdf'},
    {id:'biseladora',name:'Biseladora',model:'KRBS 101',brand:'KRBS',cat:'corte',img:'biseladoratubos.jpg',pdf:'biseladoratubos.pdf'},
    {id:'ionplasma',name:'Ion Plasma Cutter',model:'Plasma',brand:'Generico',cat:'corte',img:'ionplasma.jpg',pdf:'ionplasma.pdf'}
];

        const $ = id => document.getElementById(id);
        
        let machine = null, pdfBase64 = null, currentUser = null, recognition = null, recActive = false;

        const s = localStorage.getItem('tallerUser');
        if (s) { currentUser = JSON.parse(s); $('loginBtn').textContent = currentUser.role === 'teacher' ? 'Profesor' : 'Alumno'; }

        render();
        setupVoice();
        events();

        function events() {
            $('searchInput').oninput = e => filter(e.target.value);
            $('voiceSearchBtn').onclick = () => vToggle('search');
            document.querySelectorAll('.filter').forEach(f => f.onclick = () => {
                document.querySelectorAll('.filter').forEach(x => x.classList.remove('active'));
                f.classList.add('active');
                filter(f.dataset.filter);
            });
            $('close').onclick = () => $('machineModal').classList.remove('active');
            $('machineModal').onclick = e => { if (e.target.id === 'machineModal') $('machineModal').classList.remove('active'); };
            document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
                document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
                t.classList.add('active');
                $(t.dataset.tab + 'Tab').classList.add('active');
            });
            $('send').onclick = chat;
            $('input').onkeypress = e => { if (e.key === 'Enter') chat(); };
            $('voiceBtn').onclick = () => vToggle('chat');
            $('loginBtn').onclick = () => { if (currentUser) { if (confirm('Cerrar sesion?')) { currentUser = null; localStorage.removeItem('tallerUser'); $('loginBtn').textContent = 'Entrar'; toast('Sesion cerrada', 'success'); } } else $('loginModal').classList.add('active'); };
            $('studentBtn').onclick = () => login('student');
            $('teacherBtn').onclick = () => $('codeSection').classList.remove('hidden');
            $('codeBtn').onclick = () => { if ($('code').value === 'TALLER2024') login('teacher'); else toast('Codigo incorrecto', 'error'); };
            $('loginClose').onclick = () => $('loginModal').classList.remove('active');
        }

        function render(list = MACHINES) {
            $('grid').innerHTML = list.map(m => `
                <div class="card" onclick="openM('${m.id}')">
                    <div class="card-img">
                        <img src="${m.img}" alt="${m.name}" onerror="this.style.display='none'">
                        <span class="card-badge badge-${m.cat}">${m.cat}</span>
                        <div class="card-overlay">
                            <div class="card-name">${m.name}</div>
                            <div class="card-model">${m.model} - ${m.brand}</div>
                            <div class="card-status"><span class="status-dot"></span>PDF listo</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filter(q) { const l = q.toLowerCase(); render(MACHINES.filter(m => m.name.toLowerCase().includes(l) || m.model.toLowerCase().includes(l) || m.brand.toLowerCase().includes(l))); }

        window.openM = async id => {
            machine = MACHINES.find(m => m.id === id);
            if (!machine) return;
            $('title').textContent = machine.name;
            $('input').value = '';
            $('msgs').innerHTML = '';
            addMsg('ai', `Hola. Soy el asistente tecnico de <strong>${machine.name}</strong>.<p>Estoy analizando el manual PDF. ¿Que necesitas saber?</p>`);
            
            await loadPDF(machine.pdf);
            
            $('pdf').innerHTML = `<embed src="${machine.pdf}" type="application/pdf" width="100%" height="100%">`;
            $('machineModal').classList.add('active');
        };

        async function loadPDF(pdfFile) {
            try {
                addMsg('ai', '<em>Cargando manual PDF...</em>');
                const base = window.location.href.replace(/\/$/, '').replace(/index\.html$/, '');
                const response = await fetch(`${base}/${pdfFile}`);
                if (!response.ok) throw new Error('PDF no encontrado');
                const arrayBuffer = await response.arrayBuffer();
                pdfBase64 = arrayBufferToBase64(arrayBuffer);
                const msgs = $('msgs');
                if (msgs.lastChild && msgs.lastChild.querySelector && msgs.lastChild.querySelector('em')) msgs.removeChild(msgs.lastChild);
            } catch (error) {
                console.error('Error cargando PDF:', error);
                pdfBase64 = null;
                addMsg('ai', '<em>No se pudo cargar el PDF. Verifica que el archivo existe.</em>');
            }
        }

        function arrayBufferToBase64(buffer) {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
            return btoa(binary);
        }

        async function chat() {
            const q = $('input').value.trim();
            if (!q || !machine) return;
            addMsg('user', q);
            $('input').value = '';
            $('send').disabled = true;
            
            if (!pdfBase64) {
                addMsg('ai', 'El PDF no se ha cargado. Cierra y vuelve a abrir.');
                $('send').disabled = false;
                return;
            }
            
            try {
                const response = await fetch('https://taller-acci-ducu.vercel.app/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: q, pdfBase64: pdfBase64, machineName: machine.name })
                });
                const data = await response.json();
                if (response.ok && data.answer) addMsg('ai', data.answer.replace(/\n/g, '<br>'));
                else addMsg('ai', 'Error: ' + (data.error || 'No se pudo procesar'));
            } catch (e) {
                addMsg('ai', 'Error de conexion. Intenta de nuevo.');
            }
            $('send').disabled = false;
        }

        function addMsg(type, html) {
            const d = document.createElement('div');
            d.className = `msg ${type}`;
            d.innerHTML = `<div class="msg-avatar">${type === 'ai' ? '🤖' : '👤'}</div><div class="msg-bubble">${html}</div>`;
            $('msgs').appendChild(d);
            $('msgs').scrollTop = $('msgs').scrollHeight;
        }

        window.ask = q => { $('input').value = q; chat(); };

        function setupVoice() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) return;
            recognition = new SR();
            recognition.lang = 'es-ES';
            recognition.onresult = e => {
                const t = e.results[0][0].transcript;
                if ($('machineModal').classList.contains('active')) { $('input').value = t; chat(); }
                else { $('searchInput').value = t; filter(t); }
            };
            recognition.onerror = recognition.onend = () => { recActive = false; $('voiceSearchBtn').classList.remove('recording'); $('voiceBtn').classList.remove('recording'); };
        }

        function vToggle(ctx) {
            if (!recognition) { toast('Voz no soportada', 'error'); return; }
            if (recActive) recognition.stop();
            else { recActive = true; (ctx === 'search' ? $('voiceSearchBtn') : $('voiceBtn')).classList.add('recording'); recognition.start(); }
        }

        function login(role) {
            currentUser = {role};
            localStorage.setItem('tallerUser', JSON.stringify(currentUser));
            $('loginBtn').textContent = role === 'teacher' ? 'Profesor' : 'Alumno';
            $('loginModal').classList.remove('active');
            toast('Bienvenido', 'success');
        }

        function toast(msg, type = 'info') {
            const d = document.createElement('div');
            d.className = `toast ${type}`;
            d.textContent = msg;
            $('toasts').appendChild(d);
            setTimeout(() => d.remove(), 2500);
        }
    </script>
</body>
</html>
