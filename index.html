<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1e3a5f">
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="LOGOTALLER.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Taller IES">
    
    <title>Taller IES ACCI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --accent: #f97316;
            --success: #10b981;
            --error: #ef4444;
            --bg: #f8fafc;
            --bg-card: #fff;
            --text: #0f172a;
            --text2: #64748b;
            --border: #e2e8f0;
        }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; right: 0; height: 220px;
            background: linear-gradient(135deg, #1e3a5f, #2563eb);
            border-radius: 0 0 50% 50% / 0 0 40px 40px; z-index: 0;
        }
        .app { position: relative; z-index: 1; }
        
        /* SPLASH SCREEN */
        .splash {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #1e3a5f, #2563eb);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        .splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .splash-logo {
            width: 180px;
            height: 180px;
            background: white;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: pulse 2s ease-in-out infinite;
        }
        .splash-logo img { width: 85%; height: 85%; object-fit: contain; }
        .splash-title { margin-top: 2rem; font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; font-weight: 700; color: white; text-align: center; }
        .splash-subtitle { margin-top: 0.5rem; font-size: 1rem; color: rgba(255,255,255,0.8); }
        .splash-loader { margin-top: 2.5rem; width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        .header { padding: 1rem; display: flex; align-items: center; justify-content: space-between; }
        .header-brand { display: flex; align-items: center; gap: 0.85rem; }
        .header-logo { 
            width: 56px; height: 56px; background: white; border-radius: 14px; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 4px 16px rgba(0,0,0,0.2); overflow: hidden;
        }
        .header-logo img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }
        .header-logo svg { width: 28px; height: 28px; color: var(--primary); }
        .header h1 { font-family: 'Space Grotesk', sans-serif; color: white; font-size: 1.15rem; font-weight: 700; }
        .header span { font-size: 0.72rem; color: rgba(255,255,255,0.85); }
        .btn { padding: 0.6rem 1.1rem; background: white; border: none; border-radius: 10px; font-family: inherit; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .content { padding: 0.5rem 1rem 1.5rem; }
        .search-box { background: white; border-radius: 14px; padding: 0.75rem 1rem; display: flex; align-items: center; gap: 0.7rem; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin-bottom: 1.1rem; }
        .search-box input { flex: 1; border: none; background: transparent; font-size: 0.95rem; }
        .search-box input:focus { outline: none; }
        .voice-btn { width: 40px; height: 40px; background: #f1f5f9; border: none; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .voice-btn.recording { background: var(--error); color: white; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
        
        .filters { display: flex; gap: 0.45rem; margin-bottom: 1.1rem; overflow-x: auto; padding-bottom: 0.3rem; }
        .filters::-webkit-scrollbar { display: none; }
        .filter { 
            padding: 0.5rem 1rem; background: rgba(255,255,255,0.9); border: none; 
            border-radius: 18px; font-size: 0.82rem; font-weight: 500; cursor: pointer; 
            white-space: nowrap; transition: all 0.2s; flex-shrink: 0;
        }
        .filter:hover { background: white; }
        .filter.active { background: var(--primary); color: white; }
        .section-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.15rem; font-weight: 700; margin-bottom: 0.75rem; display: flex; align-items: center; justify-content: space-between; }
        
        .machines-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        @media (min-width: 420px) { .machines-grid { gap: 1.1rem; } }
        @media (min-width: 600px) { .machines-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 900px) { .machines-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (min-width: 1100px) { .machines-grid { grid-template-columns: repeat(5, 1fr); } }
        @media (min-width: 1300px) { .machines-grid { grid-template-columns: repeat(6, 1fr); } }
        
        .card { 
            background: white; border-radius: 18px; overflow: hidden; 
            box-shadow: 0 3px 12px rgba(0,0,0,0.08); cursor: pointer; 
            transition: transform 0.25s, box-shadow 0.25s; position: relative;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 12px 28px rgba(0,0,0,0.12); }
        
        .card-img { width: 100%; height: 180px; position: relative; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; object-position: center; }
        .card-badge { position: absolute; top: 0.6rem; right: 0.6rem; padding: 0.25rem 0.6rem; border-radius: 8px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; z-index: 2; }
        .badge-soldadura { background: #fecaca; color: #991b1b; }
        .badge-corte { background: #bfdbfe; color: #1e40af; }
        .badge-conformado { background: #bbf7d0; color: #166534; }
        
        .card-overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 2rem 0.9rem 0.85rem;
        }
        .card-name { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.05rem; color: white; margin-bottom: 0.15rem; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .card-model { font-size: 0.8rem; color: rgba(255,255,255,0.85); margin-bottom: 0.3rem; }
        .card-status { display: flex; align-items: center; gap: 0.3rem; font-size: 0.72rem; color: rgba(255,255,255,0.7); }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: none; align-items: flex-end; justify-content: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-box { background: white; width: 100%; max-width: 500px; max-height: 92vh; border-radius: 20px 20px 0 0; overflow: hidden; display: flex; flex-direction: column; }
        @media (min-width: 600px) { .modal { align-items: center; padding: 1rem; } .modal-box { border-radius: 16px; } }
        .modal-header { padding: 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .modal-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.05rem; font-weight: 700; }
        .modal-close { width: 36px; height: 36px; background: #f1f5f9; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { background: var(--error); color: white; }
        .tabs { display: flex; border-bottom: 1px solid var(--border); }
        .tab { flex: 1; padding: 0.85rem; background: transparent; border: none; border-bottom: 2px solid transparent; font-family: inherit; font-size: 0.9rem; font-weight: 600; cursor: pointer; color: var(--text2); }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
        .modal-body { flex: 1; overflow-y: auto; padding: 1rem; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .pdf-container { background: #1e293b; border-radius: 10px; height: 420px; }
        .pdf-container embed { width: 100%; height: 100%; border: none; }
        .chat-box { display: flex; flex-direction: column; height: 400px; }
        .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.75rem; padding: 0.3rem; }
        .msg { display: flex; gap: 0.55rem; max-width: 90%; }
        .msg.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 0.8rem; font-weight: 700; }
        .msg.ai .msg-avatar { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
        .msg.user .msg-avatar { background: var(--accent); color: white; }
        .msg-bubble { padding: 0.85rem 1rem; border-radius: 14px; font-size: 0.92rem; line-height: 1.6; }
        .msg.ai .msg-bubble { background: #f1f5f9; border-bottom-left-radius: 4px; }
        .msg.user .msg-bubble { background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .msg-bubble strong { color: var(--accent); font-weight: 700; }
        .msg.user .msg-bubble strong { color: #fef3c7; }
        .msg-bubble em { color: var(--text2); font-style: normal; font-size: 0.85rem; }
        .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 { margin: 0.8rem 0 0.4rem; font-family: 'Space Grotesk', sans-serif; color: var(--text); }
        .msg-bubble h1 { font-size: 1.1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
        .msg-bubble h2 { font-size: 1rem; }
        .msg-bubble h3 { font-size: 0.95rem; }
        .msg-bubble ul, .msg-bubble ol { padding-left: 1.2rem; margin: 0.4rem 0; }
        .msg-bubble li { margin-bottom: 0.25rem; }
        .chat-input-box { padding: 0.65rem 0; border-top: 1px solid var(--border); }
        .quick-btns { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.55rem; }
        .quick-btn { padding: 0.45rem 0.8rem; background: #f8fafc; border: 1px solid var(--border); border-radius: 16px; font-size: 0.78rem; cursor: pointer; }
        .quick-btn:hover { background: var(--primary); border-color: var(--primary); color: white; }
        .input-row { display: flex; gap: 0.5rem; }
        .chat-input { flex: 1; padding: 0.85rem 1rem; border: 1px solid var(--border); border-radius: 12px; font-size: 0.95rem; font-family: inherit; }
        .chat-input:focus { outline: none; border-color: var(--primary); }
        .chat-btn { width: 48px; height: 48px; border: none; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .chat-btn.send { background: var(--primary); color: white; }
        .chat-btn.send:disabled { background: #94a3b8; }
        .chat-btn.voice { background: #f8fafc; border: 1px solid var(--border); color: var(--text2); }
        .chat-btn.voice.recording { background: var(--error); border-color: var(--error); color: white; animation: pulse 1s infinite; }
        .toast-container { position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%); z-index: 2000; }
        .toast { background: #0f172a; color: white; padding: 0.75rem 1.2rem; border-radius: 10px; font-size: 0.88rem; animation: fadeIn 0.3s; }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--error); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .login-content { padding: 1.3rem; text-align: center; }
        .login-icon { width: 72px; height: 72px; background: linear-gradient(135deg, #e0e7ff, #c7d2fe); border-radius: 14px; margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .login-icon img { width: 100%; height: 100%; object-fit: contain; padding: 8px; }
        .login-icon svg { width: 36px; height: 36px; color: var(--primary); }
        .login-content h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.25rem; margin-bottom: 0.2rem; }
        .login-content > p { color: var(--text2); margin-bottom: 1.1rem; font-size: 0.9rem; }
        .login-options { display: flex; flex-direction: column; gap: 0.55rem; }
        .login-option { display: flex; align-items: center; gap: 0.8rem; padding: 0.95rem; background: #f8fafc; border: 1px solid var(--border); border-radius: 12px; cursor: pointer; text-align: left; }
        .login-option:hover { border-color: var(--primary); }
        .login-option-icon { width: 42px; height: 42px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .login-option-icon svg { width: 22px; height: 22px; color: var(--primary); }
        .login-option-info h3 { font-size: 0.95rem; }
        .login-option-info p { font-size: 0.78rem; color: var(--text2); }
        .code-section { margin-top: 0.9rem; padding-top: 0.9rem; border-top: 1px solid var(--border); }
        .code-section input { width: 100%; padding: 0.7rem; background: #f8fafc; border: 1px solid var(--border); border-radius: 10px; font-size: 1rem; text-align: center; margin-bottom: 0.5rem; }
        .code-section input:focus { outline: none; border-color: var(--primary); }
        .code-hint { font-size: 0.72rem; color: var(--text2); }
        
        /* BOTON INSTALAR */
        .install-btn {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1500;
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 25px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.4);
            display: none;
            align-items: center;
            gap: 0.5rem;
            animation: bounce 2s infinite;
        }
        .install-btn.show { display: flex; }
        .install-btn:hover { transform: translateX(-50%) scale(1.05); }
        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-5px); }
        }
        
        /* BOTON FLOTANTE ADMIN */
        .fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1500;
        }
        .fab.show { display: flex; }
        
        /* FORMULARIO ADMIN */
        .admin-form { display: flex; flex-direction: column; gap: 1rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.4rem; font-size: 0.9rem; }
        .form-group input, .form-group select { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 10px; font-size: 0.95rem; font-family: inherit; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); }
        .file-upload {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .file-upload:hover { border-color: var(--primary); background: #f8fafc; }
        .file-upload.has-file { border-color: var(--success); background: #f0fdf4; }
        .file-upload-icon { font-size: 2rem; margin-bottom: 0.5rem; }
        .file-upload-text { font-size: 0.85rem; color: var(--text2); }
        .file-upload-name { font-size: 0.85rem; color: var(--success); font-weight: 600; }
    </style>
</head>
<body>
    <!-- SPLASH SCREEN -->
    <div class="splash" id="splash">
        <div class="splash-logo">
            <img src="LOGOTALLER.png" alt="Logo">
        </div>
        <div class="splash-title">Taller IES ACCI</div>
        <div class="splash-subtitle">Asistente Inteligente</div>
        <div class="splash-loader"></div>
    </div>

    <div class="app">
        <header class="header">
            <div class="header-brand">
                <div class="header-logo">
                    <img src="LOGOTALLER.png" alt="Logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
                </div>
                <div><h1>Taller IES ACCI</h1><span id="headerRole">Asistente IA</span></div>
            </div>
            <button class="btn" id="loginBtn">Entrar</button>
        </header>
        <main class="content">
            <div class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                <input type="text" id="searchInput" placeholder="Buscar maquina...">
                <button class="voice-btn" id="voiceSearchBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/></svg></button>
            </div>
            <div class="filters" id="filtersContainer">
                <button class="filter active" data-filter="all">Todas</button>
                <button class="filter" data-filter="soldadura">Soldadura</button>
                <button class="filter" data-filter="corte">Corte</button>
                <button class="filter" data-filter="conformado">Conformado</button>
            </div>
            <h2 class="section-title">Maquinas (<span id="machineCount">0</span>)</h2>
            <div class="machines-grid" id="grid"></div>
        </main>
    </div>

    <!-- BOTON INSTALAR -->
    <button class="install-btn" id="installBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Instalar App
    </button>

    <!-- BOTON FLOTANTE ADMIN -->
    <button class="fab" id="adminFab" style="display:none;">+</button>

    <div class="modal" id="machineModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 class="modal-title" id="title">-</h3>
                <button class="modal-close" id="closeBtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            </div>
            <div class="tabs">
                <button class="tab active" data-tab="chat">Consultar IA</button>
                <button class="tab" data-tab="pdf">Ver Manual PDF</button>
            </div>
            <div class="modal-body">
                <div id="chatTab" class="tab-content active">
                    <div class="chat-box">
                        <div class="chat-messages" id="msgs"></div>
                        <div class="chat-input-box">
                            <div class="quick-btns">
                                <button class="quick-btn" onclick="ask('Cuales son las especificaciones tecnicas?')">Especificaciones</button>
                                <button class="quick-btn" onclick="ask('Como se pone en marcha?')">Arranque</button>
                                <button class="quick-btn" onclick="ask('Que mantenimiento necesita?')">Mantenimiento</button>
                                <button class="quick-btn" onclick="ask('Que medidas de seguridad debo tomar?')">Seguridad</button>
                            </div>
                            <div class="input-row">
                                <input type="text" id="input" class="chat-input" placeholder="Escribe tu pregunta...">
                                <button class="chat-btn voice" id="voiceBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/></svg></button>
                                <button class="chat-btn send" id="sendBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="pdfTab" class="tab-content"><div class="pdf-container" id="pdf"></div></div>
            </div>
        </div>
    </div>

    <div class="modal" id="loginModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 class="modal-title">Acceso</h3>
                <button class="modal-close" id="loginClose"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            </div>
            <div class="login-content">
                <div class="login-icon">
                    <img src="LOGOTALLER.png" alt="Logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                </div>
                <h2>Bienvenido</h2>
                <p>Selecciona tu rol</p>
                <div class="login-options">
                    <button class="login-option" id="teacherBtn"><div class="login-option-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><div class="login-option-info"><h3>Profesor</h3><p>Consultar maquinas</p></div></button>
                    <button class="login-option" id="adminBtn" style="border-color: var(--success);"><div class="login-option-icon" style="background: #f0fdf4;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--success);"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div><div class="login-option-info"><h3>Admin</h3><p>Gestionar maquinas</p></div></button>
                </div>
                <div class="code-section hidden" id="codeSection">
                    <input type="password" id="code" placeholder="Codigo">
                    <button class="btn btn-primary" style="width:100%" id="codeBtn">Verificar</button>
                    <p class="code-hint" id="codeHint">Introduce el codigo</p>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL ADMIN - AÑADIR MÁQUINA -->
    <div class="modal" id="adminModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 class="modal-title">Añadir Maquina</h3>
                <button class="modal-close" id="adminClose"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            </div>
            <div class="modal-body">
                <form class="admin-form" id="addMachineForm">
                    <div class="form-group">
                        <label>Nombre de la maquina *</label>
                        <input type="text" id="machineName" required placeholder="Ej: Plegadora hidráulica">
                    </div>
                    <div class="form-group">
                        <label>Modelo</label>
                        <input type="text" id="machineModel" placeholder="Ej: hS2 AS">
                    </div>
                    <div class="form-group">
                        <label>Marca</label>
                        <input type="text" id="machineBrand" placeholder="Ej: Generic">
                    </div>
                    <div class="form-group">
                        <label>Categoria *</label>
                        <select id="machineCat" required>
                            <option value="">Seleccionar...</option>
                            <option value="soldadura">Soldadura</option>
                            <option value="corte">Corte</option>
                            <option value="conformado">Conformado</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Imagen (JPG) *</label>
                        <div class="file-upload" id="imageUpload">
                            <div class="file-upload-icon">📷</div>
                            <div class="file-upload-text">Toca para subir imagen</div>
                            <input type="file" accept="image/*" id="machineImage" style="display:none;">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Manual (PDF) *</label>
                        <div class="file-upload" id="pdfUpload">
                            <div class="file-upload-icon">📄</div>
                            <div class="file-upload-text">Toca para subir PDF</div>
                            <input type="file" accept=".pdf" id="machinePdf" style="display:none;">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success" style="width:100%;">Guardar Maquina</button>
                </form>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toasts"></div>

    <script>
        // PWA - SERVICE WORKER
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('sw.js').catch(function(err) { console.log('SW Error:', err); });
            });
        }

        // PWA - BOTON INSTALAR
        let deferredPrompt = null;
        const installBtn = document.getElementById('installBtn');
        
        window.addEventListener('beforeinstallprompt', function(e) {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.add('show');
        });
        
        installBtn.addEventListener('click', function() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(function() {
                    deferredPrompt = null;
                    installBtn.classList.remove('show');
                });
            }
        });
        
        window.addEventListener('appinstalled', function() {
            toast('App instalada', 'success');
            installBtn.classList.remove('show');
        });

        // SPLASH SCREEN
        setTimeout(function() {
            document.getElementById('splash').classList.add('hidden');
        }, 2500);

        // MAQUINAS
        let MACHINES = [];
        let currentUser = null;
        let isAdmin = false;
        let machine = null;
        let pdfBase64 = null;
        let recognition = null;
        let recActive = false;
        let selectedImage = null;
        let selectedPdf = null;

        const $ = id => document.getElementById(id);

        // Cargar sesión guardada
        const s = localStorage.getItem('tallerUser');
        if (s) { 
            currentUser = JSON.parse(s); 
            updateUIForUser();
        }

        loadMachines();
        setupVoice();
        setupEvents();
        setupFileUploads();

        function loadMachines() {
            fetch('machines.json')
                .then(r => r.json())
                .then(data => {
                    MACHINES = data;
                    renderGrid(MACHINES);
                })
                .catch(e => {
                    console.error('Error loading machines:', e);
                    MACHINES = [
                        {id:'rustler',name:'Rustler EM',model:'EM',brand:'ESAB',cat:'soldadura',img:'rustler.jpg',pdf:'rustler.pdf'},
                        {id:'buddy',name:'Buddy ARC 180',model:'ARC 180',brand:'ESAB',cat:'soldadura',img:'buddy.jpg',pdf:'buddy.pdf'},
                        {id:'buddytig',name:'Buddy TIG 160',model:'TIG 160',brand:'ESAB',cat:'soldadura',img:'buddytig.jpg',pdf:'buddytig.pdf'},
                        {id:'sierra',name:'Sierra de Cinta',model:'FAT 280',brand:'FAT',cat:'corte',img:'FAT280.jpg',pdf:'FAT280.pdf'},
                        {id:'curvadora',name:'Curvadora',model:'RBM 1050-22',brand:'RBM',cat:'conformado',img:'RBMCURVADORA.jpg',pdf:'RBMCURVADORA.pdf'},
                        {id:'biseladora',name:'Biseladora',model:'KRBS 101',brand:'KRBS',cat:'corte',img:'biseladoratubos.jpg',pdf:'biseladoratubos.pdf'},
                        {id:'ionplasma',name:'Ion Plasma Cutter',model:'Plasma',brand:'NomadTechnologies',cat:'corte',img:'ionplasma.jpg',pdf:'ionplasma.pdf'},
                        {id:'powermax',name:'Cortadora Plasma',model:'Powermax 900',brand:'Hypertherm',cat:'corte',img:'cortadoraplasmamanual.jpg',pdf:'cortadoraplasmamanual.pdf'},
                        {id:'selco',name:'Neomig 2400',model:'Semiautomatica',brand:'Selco',cat:'soldadura',img:'selco.jpg',pdf:'selco.pdf'},
                        {id:'rebel',name:'Rebel 235ic',model:'Semiautomatica',brand:'ESAB',cat:'soldadura',img:'rebel.jpg',pdf:'rebel.pdf'},
                        {id:'taladro',name:'Taladro Columna',model:'S32',brand:'Ibarmia',cat:'corte',img:'taladro.jpg',pdf:'taladro.pdf'},
                        {id:'plegadora',name:'Plegadora',model:'hS2 AS',brand:'Generica',cat:'conformado',img:'plegadora.jpg',pdf:'plegadora.pdf'}
                    ];
                    renderGrid(MACHINES);
                });
        }

        function updateUIForUser() {
            $('loginBtn').textContent = currentUser.role === 'admin' ? 'Admin' : 'Profesor';
            $('headerRole').textContent = currentUser.role === 'admin' ? 'Administrador' : 'Asistente IA';
            
            if (currentUser.role === 'admin') {
                isAdmin = true;
                $('adminFab').classList.add('show');
            }
        }

        function setupEvents() {
            $('searchInput').addEventListener('input', function() {
                const q = this.value.toLowerCase().trim();
                if (q.length > 0) {
                    renderGrid(MACHINES.filter(m => m.name.toLowerCase().includes(q) || m.model.toLowerCase().includes(q) || m.brand.toLowerCase().includes(q)));
                } else {
                    renderGrid(MACHINES);
                }
            });
            
            $('voiceSearchBtn').addEventListener('click', function() { startVoice('search'); });
            
            const filterBtns = document.querySelectorAll('.filter');
            filterBtns.forEach(function(btn) {
                btn.addEventListener('click', function() {
                    filterBtns.forEach(function(b) { b.classList.remove('active'); });
                    this.classList.add('active');
                    filterMachines(this.getAttribute('data-filter'));
                });
            });
            
            $('closeBtn').addEventListener('click', function() { $('machineModal').classList.remove('active'); });
            $('machineModal').addEventListener('click', function(e) { if (e.target.id === 'machineModal') $('machineModal').classList.remove('active'); });
            
            document.querySelectorAll('.tab').forEach(function(t) {
                t.addEventListener('click', function() {
                    document.querySelectorAll('.tab').forEach(function(x) { x.classList.remove('active'); });
                    document.querySelectorAll('.tab-content').forEach(function(x) { x.classList.remove('active'); });
                    t.classList.add('active');
                    $(t.getAttribute('data-tab') + 'Tab').classList.add('active');
                });
            });
            
            $('sendBtn').addEventListener('click', sendChat);
            $('input').addEventListener('keypress', function(e) { if (e.key === 'Enter') sendChat(); });
            $('voiceBtn').addEventListener('click', function() { startVoice('chat'); });
            
            $('loginBtn').addEventListener('click', function() { 
                if (currentUser) { 
                    if (confirm('Cerrar sesion?')) { 
                        currentUser = null; 
                        isAdmin = false;
                        localStorage.removeItem('tallerUser'); 
                        $('loginBtn').textContent = 'Entrar';
                        $('headerRole').textContent = 'Asistente IA';
                        $('adminFab').classList.remove('show');
                        toast('Sesion cerrada', 'success'); 
                    } 
                } else { 
                    $('loginModal').classList.add('active'); 
                } 
            });
            
            $('teacherBtn').addEventListener('click', function() { $('codeSection').classList.remove('hidden'); $('codeHint').textContent = 'Codigo: TALLER2024'; $('code').dataset.admin = ''; });
            $('adminBtn').addEventListener('click', function() { $('codeSection').classList.remove('hidden'); $('codeHint').textContent = 'Introduce tu clave de Admin'; $('code').dataset.admin = 'true'; });
            $('codeBtn').addEventListener('click', verifyCode);
            $('loginClose').addEventListener('click', function() { $('loginModal').classList.remove('active'); $('codeSection').classList.add('hidden'); $('code').dataset.admin = ''; });
            
            // Admin
            $('adminFab').addEventListener('click', function() { $('adminModal').classList.add('active'); });
            $('adminClose').addEventListener('click', function() { $('adminModal').classList.remove('active'); resetAdminForm(); });
            $('adminModal').addEventListener('click', function(e) { if (e.target.id === 'adminModal') { $('adminModal').classList.remove('active'); resetAdminForm(); } });
            $('addMachineForm').addEventListener('submit', addMachine);
        }

        function setupFileUploads() {
            const imageUpload = $('imageUpload');
            const pdfUpload = $('pdfUpload');
            const imageInput = $('machineImage');
            const pdfInput = $('machinePdf');
            
            imageUpload.addEventListener('click', () => imageInput.click());
            pdfUpload.addEventListener('click', () => pdfInput.click());
            
            imageInput.addEventListener('change', function() {
                if (this.files[0]) {
                    selectedImage = this.files[0];
                    imageUpload.classList.add('has-file');
                    imageUpload.querySelector('.file-upload-text').textContent = selectedImage.name;
                    imageUpload.querySelector('.file-upload-text').className = 'file-upload-name';
                }
            });
            
            pdfInput.addEventListener('change', function() {
                if (this.files[0]) {
                    selectedPdf = this.files[0];
                    pdfUpload.classList.add('has-file');
                    pdfUpload.querySelector('.file-upload-text').textContent = selectedPdf.name;
                    pdfUpload.querySelector('.file-upload-text').className = 'file-upload-name';
                }
            });
        }

        async function verifyCode() {
            const code = $('code').value;
            const isAdminLogin = $('code').dataset.admin === 'true';
            
            const endpoint = isAdminLogin ? '/api/admin/verify' : '/api/verify-code';
            
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: code })
                });
                
                const data = await response.json();
                
                if (response.ok && data.valid) {
                    login(isAdminLogin ? 'admin' : 'teacher');
                    $('loginModal').classList.remove('active');
                    $('codeSection').classList.add('hidden');
                    $('code').value = '';
                    $('code').dataset.admin = '';
                } else {
                    toast('Codigo incorrecto', 'error');
                }
            } catch (e) {
                toast('Error de conexion', 'error');
            }
        }

        async function addMachine(e) {
            e.preventDefault();
            
            const name = $('machineName').value.trim();
            const model = $('machineModel').value.trim() || 'N/A';
            const brand = $('machineBrand').value.trim() || 'Generic';
            const cat = $('machineCat').value;
            
            if (!name || !cat || !selectedImage || !selectedPdf) {
                toast('Completa todos los campos obligatorios', 'error');
                return;
            }
            
            const formData = new FormData();
            formData.append('name', name);
            formData.append('model', model);
            formData.append('brand', brand);
            formData.append('category', cat);
            formData.append('image', selectedImage);
            formData.append('pdf', selectedPdf);
            
            try {
                toast('Subiendo maquina...', 'info');
                
                const response = await fetch('/api/admin/add-machine', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    toast('Maquina añadida correctamente', 'success');
                    $('adminModal').classList.remove('active');
                    resetAdminForm();
                    loadMachines();
                } else {
                    toast(data.error || 'Error al añadir maquina', 'error');
                }
            } catch (e) {
                toast('Error de conexion', 'error');
            }
        }

        function resetAdminForm() {
            $('addMachineForm').reset();
            selectedImage = null;
            selectedPdf = null;
            
            const imageUpload = $('imageUpload');
            const pdfUpload = $('pdfUpload');
            
            imageUpload.classList.remove('has-file');
            pdfUpload.classList.remove('has-file');
            imageUpload.querySelector('.file-upload-name').textContent = 'Toca para subir imagen';
            imageUpload.querySelector('.file-upload-name').className = 'file-upload-text';
            pdfUpload.querySelector('.file-upload-name').textContent = 'Toca para subir PDF';
            pdfUpload.querySelector('.file-upload-name').className = 'file-upload-text';
        }

        function filterMachines(cat) {
            if (cat === 'all') renderGrid(MACHINES);
            else renderGrid(MACHINES.filter(function(m) { return m.cat === cat; }));
        }
        
        function renderGrid(list) {
            $('machineCount').textContent = list.length;
            $('grid').innerHTML = list.map(function(m) {
                return '<div class="card" onclick="openMachine(\'' + m.id + '\')">' +
                    '<div class="card-img">' +
                        '<img src="' + m.img + '" alt="' + m.name + '" onerror="this.style.display=\'none\'">' +
                        '<span class="card-badge badge-' + m.cat + '">' + m.cat + '</span>' +
                        '<div class="card-overlay">' +
                            '<div class="card-name">' + m.name + '</div>' +
                            '<div class="card-model">' + m.model + ' - ' + m.brand + '</div>' +
                            '<div class="card-status"><span class="status-dot"></span>PDF listo</div>' +
                        '</div>' +
                    '</div>' +
                '</div>';
            }).join('');
        }
        
        window.openMachine = async function(id) {
            machine = MACHINES.find(function(m) { return m.id === id; });
            if (!machine) return;
            
            $('title').textContent = machine.name;
            $('input').value = '';
            $('msgs').innerHTML = '';
            addMsg('ai', 'Hola. Soy el asistente tecnico de <strong>' + machine.name + '</strong>.<p>Estoy analizando el manual PDF. ¿Que necesitas saber?</p>');
            
            await loadPDF(machine.pdf);
            
            $('pdf').innerHTML = '<embed src="' + machine.pdf + '" type="application/pdf" width="100%" height="100%">';
            $('machineModal').classList.add('active');
        };

        async function loadPDF(pdfFile) {
            try {
                addMsg('ai', '<em>Cargando manual PDF...</em>');
                const base = window.location.href.replace(/\/$/, '').replace(/index\.html$/, '');
                const response = await fetch(base + '/' + pdfFile);
                if (!response.ok) throw new Error('PDF no encontrado');
                const arrayBuffer = await response.arrayBuffer();
                pdfBase64 = arrayBufferToBase64(arrayBuffer);
                const msgs = $('msgs');
                if (msgs.lastChild && msgs.lastChild.querySelector && msgs.lastChild.querySelector('em')) msgs.removeChild(msgs.lastChild);
            } catch (error) {
                console.error('Error:', error);
                pdfBase64 = null;
                addMsg('ai', '<em>No se pudo cargar el PDF.</em>');
            }
        }

        function arrayBufferToBase64(buffer) {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
            return btoa(binary);
        }
        
        async function sendChat() {
            const q = $('input').value.trim();
            if (!q || !machine) return;
            
            addMsg('user', q);
            $('input').value = '';
            $('sendBtn').disabled = true;
            
            if (!pdfBase64) { addMsg('ai', 'El PDF no se ha cargado.'); $('sendBtn').disabled = false; return; }
            
            try {
                const response = await fetch('https://taller-acci-ducu.vercel.app/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: q, pdfBase64: pdfBase64, machineName: machine.name })
                });
                const data = await response.json();
                if (response.ok && data.answer) addMsg('ai', data.answer);
                else addMsg('ai', 'Error: ' + (data.error || 'No se pudo procesar'));
            } catch (e) { addMsg('ai', 'Error de conexion.'); }
            $('sendBtn').disabled = false;
        }
        
        function addMsg(type, html) {
            if (type === 'ai') {
                html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
                html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
                html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');
                html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
                html = html.replace(/^- (.*$)/gm, '<li>$1</li>');
                html = html.replace(/^(\d+)\. (.*$)/gm, '<li>$2</li>');
                html = html.replace(/\n/g, '<br>');
            }
            
            const d = document.createElement('div');
            d.className = 'msg ' + type;
            d.innerHTML = '<div class="msg-avatar">' + (type === 'ai' ? '🤖' : '👤') + '</div><div class="msg-bubble">' + html + '</div>';
            $('msgs').appendChild(d);
            $('msgs').scrollTop = $('msgs').scrollHeight;
        }

        window.ask = function(q) { $('input').value = q; sendChat(); };

        function setupVoice() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) return;
            recognition = new SR();
            recognition.lang = 'es-ES';
            recognition.onresult = function(e) {
                const t = e.results[0][0].transcript;
                if ($('machineModal').classList.contains('active')) { $('input').value = t; sendChat(); }
                else { $('searchInput').value = t; $('searchInput').dispatchEvent(new Event('input')); }
            };
            recognition.onerror = recognition.onend = function() { recActive = false; $('voiceSearchBtn').classList.remove('recording'); $('voiceBtn').classList.remove('recording'); };
        }

        function startVoice(ctx) {
            if (!recognition) { toast('Voz no soportada', 'error'); return; }
            if (recActive) recognition.stop();
            else { recActive = true; if (ctx === 'search') $('voiceSearchBtn').classList.add('recording'); else $('voiceBtn').classList.add('recording'); recognition.start(); }
        }
        
        function login(role) {
            currentUser = {role: role};
            localStorage.setItem('tallerUser', JSON.stringify(currentUser));
            updateUIForUser();
            $('loginModal').classList.remove('active');
            toast('Bienvenido', 'success');
        }
        
        function toast(msg, type) {
            const d = document.createElement('div');
            d.className = 'toast ' + type;
            d.textContent = msg;
            $('toasts').appendChild(d);
            setTimeout(function() { d.remove(); }, 2500);
        }
    </script>
</body>
</html>
